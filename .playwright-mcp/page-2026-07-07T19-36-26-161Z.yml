        - heading "Stitchwork & seams" [level=3] [ref=f1e73]
        - paragraph [ref=f1e74]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f1e75]: from $19
      - article [ref=f1e76]:
