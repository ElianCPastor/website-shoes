        - heading "Leather restoration" [level=3] [ref=f1e78]
        - paragraph [ref=f1e79]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f1e80]: from $39
