        - heading "Full resole" [level=3] [ref=f5e72]
        - paragraph [ref=f5e73]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f5e74]: from $49
      - article [ref=f5e75]:
        - paragraph [ref=f5e76]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f5e77]
        - paragraph [ref=f5e78]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f5e79]: from $19
      - article [ref=f5e80]:
        - paragraph [ref=f5e81]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f5e82]
        - paragraph [ref=f5e83]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f5e84]: from $39
      - article [ref=f5e85]:
        - paragraph [ref=f5e86]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f5e87]
        - paragraph [ref=f5e88]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f5e89]: from $59
      - article [ref=f5e90]:
        - paragraph [ref=f5e91]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f5e92]
        - paragraph [ref=f5e93]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f5e94]: from $25
      - article [ref=f5e95]:
        - paragraph [ref=f5e96]: Nº 06
        - heading "The weird ones" [level=3] [ref=f5e97]
        - paragraph [ref=f5e98]: Ballet flats, waders, vintage football boots, a single left shoe. Bring it. We quote on sight.
        - paragraph [ref=f5e99]: quoted at the bench
