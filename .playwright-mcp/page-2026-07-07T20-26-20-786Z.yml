        - heading "Full resole" [level=3] [ref=f13e65]
        - paragraph [ref=f13e66]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f13e67]: from $49
      - article [ref=f13e68]:
        - paragraph [ref=f13e69]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f13e70]
        - paragraph [ref=f13e71]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f13e72]: from $19
      - article [ref=f13e73]:
        - paragraph [ref=f13e74]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f13e75]
        - paragraph [ref=f13e76]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f13e77]: from $39
      - article [ref=f13e78]:
        - paragraph [ref=f13e79]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f13e80]
        - paragraph [ref=f13e81]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f13e82]: from $59
      - article [ref=f13e83]:
        - paragraph [ref=f13e84]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f13e85]
        - paragraph [ref=f13e86]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f13e87]: from $25
      - article [ref=f13e88]:
