      - article [ref=f6e66]:
        - paragraph [ref=f6e67]: Nº 01
        - heading "Full resole" [level=3] [ref=f6e68]
        - paragraph [ref=f6e69]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f6e70]: from $49
      - article [ref=f6e71]:
        - paragraph [ref=f6e72]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f6e73]
        - paragraph [ref=f6e74]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f6e75]: from $19
      - article [ref=f6e76]:
        - paragraph [ref=f6e77]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f6e78]
        - paragraph [ref=f6e79]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f6e80]: from $39
      - article [ref=f6e81]:
        - paragraph [ref=f6e82]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f6e83]
        - paragraph [ref=f6e84]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f6e85]: from $59
      - article [ref=f6e86]:
        - paragraph [ref=f6e87]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f6e88]
        - paragraph [ref=f6e89]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f6e90]: from $25
      - article [ref=f6e91]:
        - paragraph [ref=f6e92]: Nº 06
        - heading "The weird ones" [level=3] [ref=f6e93]
        - paragraph [ref=f6e94]: Ballet flats, waders, vintage football boots, a single left shoe. Bring it. We quote on sight.
        - paragraph [ref=f6e95]: quoted at the bench
