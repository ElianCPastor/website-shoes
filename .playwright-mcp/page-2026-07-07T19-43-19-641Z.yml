        - heading "Full resole" [level=3] [ref=f9e63]
        - paragraph [ref=f9e64]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f9e65]: from $49
      - article [ref=f9e66]:
        - paragraph [ref=f9e67]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f9e68]
        - paragraph [ref=f9e69]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f9e70]: from $19
      - article [ref=f9e71]:
        - paragraph [ref=f9e72]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f9e73]
        - paragraph [ref=f9e74]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f9e75]: from $39
      - article [ref=f9e76]:
        - paragraph [ref=f9e77]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f9e78]
        - paragraph [ref=f9e79]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f9e80]: from $59
      - article [ref=f9e81]:
        - paragraph [ref=f9e82]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f9e83]
        - paragraph [ref=f9e84]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f9e85]: from $25
      - article [ref=f9e86]:
