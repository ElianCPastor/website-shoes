        - heading "Full resole" [level=3] [ref=f8e65]
        - paragraph [ref=f8e66]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f8e67]: from $49
      - article [ref=f8e68]:
