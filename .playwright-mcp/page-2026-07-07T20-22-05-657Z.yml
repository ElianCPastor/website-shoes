        - heading "Stitchwork & seams" [level=3] [ref=f8e70]
        - paragraph [ref=f8e71]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f8e72]: from $19
      - article [ref=f8e73]:
