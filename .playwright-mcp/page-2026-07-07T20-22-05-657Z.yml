        - heading "Leather restoration" [level=3] [ref=f8e75]
        - paragraph [ref=f8e76]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f8e77]: from $39
      - article [ref=f8e78]:
