        - heading "Full resole" [level=3] [ref=f10e68]
        - paragraph [ref=f10e69]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f10e70]: from $49
      - article [ref=f10e71]:
        - paragraph [ref=f10e72]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f10e73]
        - paragraph [ref=f10e74]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f10e75]: from $19
      - article [ref=f10e76]:
        - paragraph [ref=f10e77]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f10e78]
        - paragraph [ref=f10e79]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f10e80]: from $39
      - article [ref=f10e81]:
        - paragraph [ref=f10e82]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f10e83]
        - paragraph [ref=f10e84]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f10e85]: from $59
      - article [ref=f10e86]:
        - paragraph [ref=f10e87]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f10e88]
        - paragraph [ref=f10e89]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f10e90]: from $25
      - article [ref=f10e91]:
        - paragraph [ref=f10e92]: Nº 06
        - heading "The weird ones" [level=3] [ref=f10e93]
