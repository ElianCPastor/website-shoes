        - heading "Full resole" [level=3] [ref=f17e70]
        - paragraph [ref=f17e71]: Worn to the canvas? We strip the old sole and build you a new one — gum, rubber, leather or lug.
        - paragraph [ref=f17e72]: from $49
      - article [ref=f17e73]:
        - paragraph [ref=f17e74]: Nº 02
        - heading "Stitchwork & seams" [level=3] [ref=f17e75]
        - paragraph [ref=f17e76]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f17e77]: from $19
      - article [ref=f17e78]:
        - paragraph [ref=f17e79]: Nº 03
        - heading "Leather restoration" [level=3] [ref=f17e80]
        - paragraph [ref=f17e81]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f17e82]: from $39
      - article [ref=f17e83]:
        - paragraph [ref=f17e84]: Nº 04
        - heading "Sneaker surgery" [level=3] [ref=f17e85]
        - paragraph [ref=f17e86]: Yellowed midsoles, crumbling foam, loose air units. We operate, they recover.
        - paragraph [ref=f17e87]: from $59
      - article [ref=f17e88]:
        - paragraph [ref=f17e89]: Nº 05
        - heading "Weatherproofing" [level=3] [ref=f17e90]
        - paragraph [ref=f17e91]: Sealed seams, waterproof wax, salt protection. Winter loses this round.
        - paragraph [ref=f17e92]: from $25
      - article [ref=f17e93]:
