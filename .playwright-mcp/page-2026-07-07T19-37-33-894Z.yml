        - heading "Leather restoration" [level=3] [ref=f3e75]
        - paragraph [ref=f3e76]: Cracked, faded, water-stained. Cleaned, conditioned, re-dyed and sealed back to depth.
        - paragraph [ref=f3e77]: from $39
