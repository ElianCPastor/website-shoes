        - heading "Stitchwork & seams" [level=3] [ref=f3e70]
        - paragraph [ref=f3e71]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f3e72]: from $19
      - article [ref=f3e73]:
