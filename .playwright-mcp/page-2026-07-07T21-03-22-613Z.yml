        - heading "Stitchwork & seams" [level=3] [ref=f4e70]
        - paragraph [ref=f4e71]: Split seams, blown quarters, torn pull tabs. Re-stitched with waxed thread, stronger than factory.
        - paragraph [ref=f4e72]: from $19
      - article [ref=f4e73]:
        - paragraph [ref=f4e74]: Nº 03
